<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medição de Temperatura</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div>
        <canvas class="graficos" id="myChart"></canvas>
    </div>
    <div>
        <canvas class="graficos" id="myChart2"></canvas>
    </div>
</body>
</html>

<script>
    const labels = [
        "12:00",
        "13:00",
        "14:00",
        "15:00",
        "16:00",
        "17:00",
    ];

    const labels2 = [
        "Janeiro",
        "Fevereiro",
        "Março",
        "Abril",
        "Maio",
        "Junho"
    ];

    const data = {
        labels: labels,
        datasets: [{
            label: "Temperatura",
            backgroundColor: "rgb(255,99,132)",
            borderColor: "rgb(255,99,132)",
            data: [30,29,28,25,22,23]
        },
        {
            label: "Umidade",
            backgroundColor: "rgb(50,178,252)",
            borderColor: "rgb(50,178,252)",
            data: [80,82,80,85,80,83]
        }]
    };

    const data2 = {
        labels: labels2,
        datasets: [{
            label: "Temperatura Média",
            backgroundColor: "rgb(255,99,132)",
            borderColor: "rgb(255,99,132)",
            data: [22,24,27,23,20,18]
        },
        {
            label: "Umidade Média",
            backgroundColor: "rgb(50,178,252)",
            borderColor: "rgb(50,178,252)",
            data: [90,89,93,87,88,82]
        }
        ]
    };
    const config = {
      type: "line" /* Tipo de gráfico */,
      data: data /* Passa o dataset */,
      options: {},
    };
    const config2 = {
      type: "bar" /* Tipo de gráfico */,
      data: data2 /* Passa o dataset */,
      options: {},
    };
</script>

<script>

    const myChart = new Chart(
        document.getElementById("myChart",),
        config
    );

    const myChart2 = new Chart(
        document.getElementById("myChart2",),
        config2
    );

</script>
